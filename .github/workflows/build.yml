name: HnS Build
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          apt-get update
          apt-get install -y build-essential libpng-dev git wget python3
          git clone --depth=1 https://github.com/pret/agbcc
          cd agbcc && ./build.sh && ./install.sh ../ && cd ..

      - name: Fix Line Endings
        run: |
          apt-get install -y dos2unix
          find . -type f -name "*" -print0 | xargs -0 dos2unix

      - name: Build ROM
        run: |
          # 1. Get the fix tool
          apt-get update && apt-get install -y dos2unix
          
          # 2. Delete ALL previous palette builds so they start fresh
          find . -name "*.gbapal" -delete
          
          # 3. Force convert every source file to Unix format
          find . -type f -name "*" -print0 | xargs -0 dos2unix
          
          # 4. Create the dummy folder for the Makefile
          mkdir -p graphics/battle_anims/unused
          touch graphics/battle_anims/unused/unknown.pal
          touch graphics/battle_anims/unused/unknown.gbapal
          
          # 5. Build - this will take longer but it will be CLEAN
          make clean
          make -j$(nproc) WERROR=0
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: HnS-ROM
          path: "*.gba"
